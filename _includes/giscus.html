<div class="giscus-wrapper" style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #444;">
  <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">💬 Komentarze, pytania i uwagi</h2>
  <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 1.5rem;">
    Masz pytanie, znalazłeś błąd lub chcesz coś dodać? Napisz komentarz poniżej. 
    Do komentowania potrzebne jest konto GitHub.
  </p>
  <script src="https://giscus.app/client.js"
    data-repo="{{ site.giscus.repo }}"
    data-repo-id="{{ site.giscus.repo_id }}"
    data-category="{{ site.giscus.category }}"
    data-category-id="{{ site.giscus.category_id }}"
    data-mapping="{{ site.giscus.mapping }}"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="{{ site.giscus.theme }}"
    data-lang="pl"
    crossorigin="anonymous"
    async>
  </script>
</div>
